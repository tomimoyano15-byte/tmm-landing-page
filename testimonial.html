<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Gold Coast Homeowners Recommend TMM | TMM Painting Gold Coast</title>
<meta name="description" content="Why Gold Coast homeowners recommend TMM. Real reviews, premium standards, and a low-pressure quote path backed by visible proof.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- HubSpot Tracking Code — auto-captures form submissions as contacts -->
<script type="text/javascript" id="hs-script-loader" async defer src="//js.hs-scripts.com/441704354.js"></script>

<!-- Meta Pixel -->

<script>
// UTM capture
const params = new URLSearchParams(window.location.search);
const utmData = {
  utm_source: params.get('utm_source') || 'meta',
  utm_medium: params.get('utm_medium') || 'paid',
  utm_campaign: params.get('utm_campaign') || '',
  utm_content: params.get('utm_content') || '',
};

// Step 1 selections
const sel = { service_type:'', property_type:'', timing:'', suburb:'' };

document.querySelectorAll('.opt-grid').forEach(grid => {
  grid.querySelectorAll('.opt-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      grid.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
      this.classList.add('selected');
      sel[grid.dataset.field] = this.dataset.value;
    });
  });
});

function goStep2() {
  sel.suburb = document.getElementById('suburb').value.trim();
  if (!sel.suburb) { document.getElementById('suburb').focus(); return; }
  if (!sel.service_type) { alert('Please select what needs painting.'); return; }
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
  document.getElementById('dot1').classList.remove('active');
  document.getElementById('dot2').classList.add('active');
  document.getElementById('stepLine').classList.add('done');
  document.getElementById('stepLabel').textContent = 'Step 2 of 2 — Your details';
}

function goStep1() {
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step1').style.display = 'block';
  document.getElementById('dot2').classList.remove('active');
  document.getElementById('dot1').classList.add('active');
  document.getElementById('stepLine').classList.remove('done');
  document.getElementById('stepLabel').textContent = 'Step 1 of 2 — About your project';
}

const GC_SUBURBS = ['surfers paradise','broadbeach','burleigh','currumbin','coolangatta',
  'tweed heads','robina','mermaid','palm beach','labrador','southport','hope island',
  'coomera','helensvale','nerang','mudgeeraba','varsity','upper coomera','oxenford',
  'runaway bay','biggera','coombabah','hollywell','paradise point','sanctuary cove',
  'pimpama','ormeau','yatala','canungra','tambourine','elanora','tugun','bilinga',
  'kirra','kingscliff','casuarina','banora point','arundel','parkwood','molendinar',
  'bundall','benowa','isle of capri','main beach','miami','merrimac','carrara',
  'worongary','tallai','gold coast'];

function isQualified(d) {
  const sub = (d.suburb||'').toLowerCase();
  const inGC = GC_SUBURBS.some(s => sub.includes(s));
  const goodTiming = ['asap','1-4_weeks'].includes(d.timing);
  const notApt = d.property_type !== 'apartment';
  return inGC && goodTiming && notApt;
}

function handleSubmit() {
  const firstname = document.getElementById('firstname').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const email = document.getElementById('email').value.trim();

  if (!firstname) { document.getElementById('firstname').focus(); return; }
  if (!phone || phone.length < 8) { document.getElementById('phone').focus(); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Sending…';

  const msgText = 'Service: '+sel.service_type+' | Property: '+sel.property_type+
    ' | Timing: '+sel.timing+' | Suburb: '+sel.suburb+
    ' | utm_source: '+utmData.utm_source+' | utm_campaign: '+utmData.utm_campaign+
    ' | utm_content: '+utmData.utm_content;

  // HubSpot formless tracking — creates/updates contact with all fields
  const _hsq = window._hsq = window._hsq || [];
  const hsIdentify = {firstname: firstname, phone: phone, city: sel.suburb, message: msgText};
  if (email) hsIdentify.email = email;
  _hsq.push(['identify', hsIdentify]);
  _hsq.push(['trackPageView']);

  // Meta Pixel
  if (typeof fbq !== 'undefined') {
    fbq('track', 'Lead', {content_name: 'Meta LP', value: 0, currency: 'AUD',
      suburb: sel.suburb, service: sel.service_type, timing: sel.timing});
    if (isQualified(sel)) {
      fbq('trackCustom', 'QualifiedLead', {suburb: sel.suburb, service: sel.service_type, timing: sel.timing});
    }
  }

  // Show success
  document.getElementById('step2').style.display = 'none';
  document.getElementById('formSuccess').style.display = 'block';
  const q = new URLSearchParams(utmData);
  q.set('lead','1');
  setTimeout(() => { window.location.href = '/thanks.html?' + q.toString(); }, 1500);
}
</script>

</body>
</html>
